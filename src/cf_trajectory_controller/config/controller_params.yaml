cf_controller_node:
  ros__parameters:

    # active_controller: "cascaded_pid"
    # active_controller: "conventional_smc"
    # active_controller: "super_twisting_smc"
    active_controller: "nstt_smc"

    active_trajectory: "figure8"
    control_frequency: 100.0

    cascaded_pid:
      # Outer loop — Position PID
      # Kp=4.0, Kd=4.0 → max accel ~2 m/s^2 at 0.5m error
      Kp_x: 4.0
      Ki_x: 0.1
      Kd_x: 4.0

      Kp_y: 4.0
      Ki_y: 0.1
      Kd_y: 4.0

      # Z stiffer for altitude hold
      Kp_z: 8.0
      Ki_z: 2.0
      Kd_z: 2.0

      # Inner loop — Attitude PID
      # Physics-based: Kp = Ixx * wn^2 = 16.57e-6 * 11.43^2 = 0.002164
      # Kd = Ixx * 2 * 0.7 * wn = 0.000265
      # Scale up slightly for simulation (Gazebo has more damping than reality)
      Kp_phi:    0.004
      Ki_phi:    0.0001
      Kd_phi:    0.0006

      Kp_theta:  0.004
      Ki_theta:  0.0001
      Kd_theta:  0.0006

      Kp_psi:    0.002
      Ki_psi:    0.00005
      Kd_psi:    0.0005

    conventional_smc:
      # Altitude
      c_z: 6.0      # was 3.0 — faster surface convergence
      ks_z: 8.0     # was 2.0 — stronger reaching
      kl_z: 4.0     # was 1.0 — stronger linear term
      # X position
      c_x: 2.0
      ks_x: 1.5
      kl_x: 0.5
      # Y position
      c_y: 3.0
      ks_y: 2.5
      kl_y: 0.5
      # Roll
      c_phi: 5.0
      ks_phi: 1.0
      kl_phi: 0.0
      # Pitch
      c_theta: 5.0
      ks_theta: 1.0
      kl_theta: 0.0
      # Yaw
      c_psi: 3.0
      ks_psi: 0.05
      kl_psi: 2.0
      # Boundary layer — wider = less chattering, more smoothing
      sat_bl: 1.0

    super_twisting_smc:
      # Altitude surface coefficients
      kpz: 6.0
      kdz: 0.0
      kiz: 0.0
      # XY velocity/accel reference scaling
      kpx: 2.0
      kpy: 3.0
      kdx: 0.0
      kdy: 0.0
      # X surface coefficients
      kp_x: 2.0
      kd_x: 0.0
      ki_x: 0.0
      # Y surface coefficients
      kp_y: 3.0
      kd_y: 0.0
      ki_y: 0.0
      # Attitude surface coefficients (shared φ, θ, ψ)
      kp: 5.0
      kd: 0.0
      ki: 0.0
      # Super-twisting gains
      k1: 4.0
      k2: 1.5
      k1_x: 1.0
      k2_x: 0.3
      k1_y: 1.5
      k2_y: 0.4

    nstt_smc:
      # Terminal exponent: gamma = p_exp / q_exp = 5/3 ≈ 1.667
      p_exp: 5
      q_exp: 3
      # Surface shape per channel
      beta_z: 3.0
      beta_phi: 3.0
      beta_theta: 2.0
      beta_psi: 1.0
      beta_x: 2.0
      beta_y: 2.0
      # Singularity protection
      mu_min: 0.05
      # Low-pass filter coefficients for phi/theta cmd derivatives
      alpha_f_phi: 0.5
      alpha_f_theta: 0.5
      # XY velocity/accel reference scaling
      kpx: 0.9
      kpy: 0.85
      kdx: 0.58
      kdy: 0.60
      # Super-twisting gains
      k1_z: 3.0
      k2_z: 2.5
      k1_att: 2.6
      k2_att: 2.0
      k1_psi: 0.5
      k2_psi: 0.6
      k1_x: 0.45
      k2_x: 0.42
      k1_y: 0.35
      k2_y: 0.40

    figure8:
      amplitude: 0.5
      omega_x:   0.4
      omega_y:   0.8
      z_const:   0.5
      psi_des:   0.0
