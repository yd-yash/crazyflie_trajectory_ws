# =============================================================================
# Crazyflie 2.1 Simulation Parameters
# Project: Sim-to-Real Pipeline for Quadrotor Trajectory Tracking
# =============================================================================

cf1_gazebo_sim:
  ros__parameters:

    # --- Vehicle Identity ---
    robot_name: "cf1"
    robot_description_frame: "world"

    # --- Physical Parameters (from crazyswarm2/crazyflie2.yaml) ---
    mass: 0.034                    # kg
    arm_length: 0.046              # m
    thrust_to_torque_ratio: 0.006  # dimensionless
    max_thrust_total: 1.3          # N (all 4 motors)
    max_thrust_per_motor: 0.325    # N

    # --- Inertia tensor (from crazyflie2.urdf) ---
    inertia_ixx: 16.571710e-6      # kg.m^2
    inertia_iyy: 16.655602e-6      # kg.m^2
    inertia_izz: 29.261652e-6      # kg.m^2

    # --- Simulation Settings ---
    sim_frequency: 1000.0          # Hz — physics update rate
    control_frequency: 500.0       # Hz — control loop rate
    publish_frequency: 100.0       # Hz — ROS topic publish rate

    # --- Gazebo Topics ---
    ground_truth_topic: "/cf1/ground_truth/odom"
    imu_topic: "/cf1/imu"
    cmd_thrust_topic: "/cf1/cmd_thrust"
    cmd_full_state_topic: "/cf1/cmd_full_state"

    # --- Initial Pose ---
    initial_position: [0.0, 0.0, 0.0]  # x, y, z in meters
    initial_yaw: 0.0                    # radians
